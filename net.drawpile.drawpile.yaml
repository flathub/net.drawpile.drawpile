app-id: net.drawpile.drawpile
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: drawpile
rename-icon: drawpile
# Gotta explicitly build with -fPIC, otherwise Qt crashes on startup.
build-options:
  cflags: '-fPIC'
  cxxflags: '-fPIC'
  ldflags: '-fPIC'
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio # needed for notification sound playback
  - --device=dri
  - --talk-name=org.freedesktop.secrets

modules:
  - name: qtkeychain
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_INSTALL_LIBDIR=/app/lib
      - -DLIB_INSTALL_DIR=/app/lib
      - -DBUILD_TRANSLATIONS=off
      - -DBUILD_WITH_QT6=on
    sources:
      - type: git
        url: https://github.com/frankosterfeld/qtkeychain.git
        tag: 0.14.3
        commit: 38ff50766c7e4ec490fecb2d9939b7cdc4b74b8e
  - name: libzip
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_INSTALL_LIBDIR=/app/lib
      - -DBUILD_TOOLS=off
      - -DBUILD_REGRESS=off
      - -DBUILD_DOC=off
      - -DBUILD_EXAMPLES=off
      - -DENABLE_COMMONCRYPTO=off
      - -DENABLE_GNUTLS=off
      - -DENABLE_MBEDTLS=off
      - -DENABLE_OPENSSL=off
      - -DENABLE_WINDOWS_CRYPTO=off
      - -DENABLE_BZIP2=off
      - -DENABLE_LZMA=off
      - -DENABLE_ZSTD=off
    sources:
      - type: git
        url: https://github.com/nih-at/libzip.git
        tag: v1.11.3
        commit: f30f5290de485348442d168cd7b2eb714d1f20f9
  - name: drawpile
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DADDRESS_SANITIZER=off
      - -DBUILTINSERVER=on
      - -DCLANG_TIDY=off
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=on
      - -DINSTALL_DOC=off
      - -DSERVER=off
      - -DSERVERGUI=off
      - -DSOURCE_ASSETS=off
      - -DPROXY_STYLE=on
      - -DTESTS=off
      - -DTOOLS=off
      - -DUSE_STRICT_ALIASING=on
      - -DBUILD_VERSION=2.3.0
    sources:
      - type: git
        url: https://github.com/drawpile/Drawpile.git
        commit: ff243e30e25f5ee08b6d5e750a00b33e114ef8b9
      # Remove this when updating to 2.3.1. It's a backported fix for an
      # incompatibility introduced in later Qt versions.
      - type: patch
        path: compatflagsarg.diff
